<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 170" width="200" height="170">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Fundo -->
  <rect width="200" height="170" fill="#000000"/>
  <!-- Primeira barra horizontal (nome do sistema em branco) -->
  <rect x="12" y="8" width="176" height="38" rx="2" fill="#22d3ee"/>
  <text x="100" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" letter-spacing="0.02em">EventFest</text>
  <!-- Estrela no canto superior direito da barra -->
  <polygon points="182,10 184,16 190,16 185,20 187,26 182,22 177,26 179,20 174,16 180,16" fill="url(#starGrad)"/>
  <!-- Duas barras finas -->
  <rect x="12" y="52" width="176" height="4" fill="#38bdf8"/>
  <path d="M 12 62 L 188 62 L 188 68 L 160 68 Q 158 64 156 68 L 144 68 Q 142 64 140 68 L 128 68 Q 126 64 124 68 L 112 68 Q 110 64 108 68 L 96 68 Q 94 64 92 68 L 80 68 Q 78 64 76 68 L 64 68 Q 62 64 60 68 L 48 68 Q 46 64 44 68 L 12 68 Z" fill="#0ea5e9"/>
  <!-- Blocos inferiores -->
  <rect x="12" y="78" width="78" height="72" fill="url(#blockGrad)"/>
  <rect x="98" y="78" width="90" height="72" fill="url(#blockGrad)" opacity="0.92"/>
</svg>
