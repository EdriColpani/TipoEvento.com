<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventFest — Redefinir senha</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0a0a0a;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="font-size:28px;font-weight:700;color:#eab308;">EventFest</div>
            </td>
          </tr>
          <tr>
            <td style="background-color:#111111;border:1px solid rgba(234,179,8,0.35);border-radius:16px;padding:32px 28px;">
              <h1 style="margin:0 0 12px;font-size:22px;color:#ffffff;">Redefinir sua senha</h1>
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#a3a3a3;">
                Recebemos uma solicitação para alterar a senha da sua conta. Use o botão abaixo para escolher uma nova senha.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px;">
                <tr>
                  <td align="center" style="border-radius:10px;background-color:#eab308;">
                    <a href="{{ .ConfirmationURL }}"
                       target="_blank"
                       style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:700;color:#000000;text-decoration:none;border-radius:10px;">
                      Redefinir senha
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;line-height:1.6;color:#525252;">
                Se você não solicitou esta alteração, ignore este e-mail. Sua senha permanece a mesma.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#525252;">EventFest · EventFest.com.br</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
